<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <title>Dottore Animations Viewer</title>
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <div id="container" style="width:100vw; height:100vh;"></div>
    <script type="module" src="/main.js"></script>    

    <div id="ui"> 
      <div id="timelineContainer">
        <input id="timeline" type="range" min="0" max="100" step="0.1" value="0"/>
      </div>

      <div id="infoBar">
        <span id="frameDisplay">Frame: 0</span>

        <div id="speedControlGroup">
          <label>Speed:</label>
          <input id="speed" type="range" min="0.01" max="2" step="0.01" value="1"/>
          <input id="speedNumber" type="number" step="0.1" value="1"/>
        </div>

        <button id="playPause">Pause</button>
      </div>
    </div>
  </body>
</html>
